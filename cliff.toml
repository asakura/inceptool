# git-cliff ~ default configuration file
# https://git-cliff.org/docs/configuration
#
# This file tells git-cliff (which release-plz uses under the hood) how to
# parse your commit history and format the resulting CHANGELOG.md files.

[changelog]
# The header goes at the very top of the changelog file.
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""

# The body template uses the Tera templating language to format each release.
# This template generates the version header and loops through commit groups.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}
    {% endfor %}
{% endfor %}\n
"""

# The footer goes at the very bottom of the changelog.
footer = """
<!-- generated by git-cliff -->
"""

# Remove leading and trailing whitespace from the templates.
trim = true

[git]
# Treat commits according to the Conventional Commits specification.
conventional_commits = true

# Ignore any commits that do not match the Conventional Commits format.
filter_unconventional = true

# Do not split multi-line commits into separate entries.
split_commits = false

# Pre-process commit messages before parsing (e.g., removing PR numbers from titles).
commit_preprocessors = [
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
]

# This is the most important section! It maps conventional commit types
# (feat, fix, chore, etc.) to the section headers in the changelog.
# The HTML comments (e.g. <!-- 0 -->) are used for sorting the sections.
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->[ADD] Features" },
    { message = "^fix", group = "<!-- 1 -->[FIX] Bug Fixes" },
    { message = "^refactor", group = "<!-- 2 -->[MOD] Refactor" },
    { message = "^doc", group = "<!-- 3 -->[DOC] Documentation" },
    { message = "^perf", group = "<!-- 4 -->[PWR] Performance" },
    { message = "^style", group = "<!-- 5 -->[UI_] Styling" },
    { message = "^test", group = "<!-- 6 -->[CHK] Testing" },

    # Skip noisy automated commits or specific chores you don't want in the changelog
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },

    # Group remaining chores and CI updates into a Miscellaneous category
    { message = "^chore|^ci", group = "<!-- 7 -->[SYS] Miscellaneous Tasks" },
    { body = ".*security", group = "<!-- 8 -->[SEC] Security" },
    { message = "^revert", group = "<!-- 9 -->[RVT] Revert" },
]

# Allow breaking commits to appear in the changelog even if they match a skip rule.
protect_breaking_commits = false

# Do not completely hide commits that don't match any parser above; 
# they'll just fall into an uncategorized group (though filter_unconventional=true takes precedence).
filter_commits = false

# Defines how tags should be formatted to be recognized as releases.
tag_pattern = "v[0-9].*"

# Sort commits inside sections by oldest or newest.
sort_commits = "oldest"
