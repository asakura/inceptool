[[read-write-guard.rules]]
filename = "migration_lock.toml"
[read-write-guard.rules.access.write]
hint = "Run `prisma migrate dev` to update it."
note = "(NOTE: it just records the migrations provider — edit `schema.prisma` and regenerate instead)"

# Android
[[read-write-guard.rules]]
filename = "local.properties"
[read-write-guard.rules.access.write]
hint = "This is written locally by Android Studio/Gradle with machine-specific SDK paths."
note = "(NOTE: it's not meant to be committed or hand-edited — let the IDE/Gradle regenerate it)"

[[read-write-guard.rules]]
filename = "R.java"
[read-write-guard.rules.access.write]
hint = "This is regenerated by the Android build system from your resources on every build."
note = "(NOTE: edit the resource XML files instead — hand edits are overwritten immediately)"

[[read-write-guard.rules]]
filename = "BuildConfig.java"
[read-write-guard.rules.access.write]
hint = "This is regenerated by the Android Gradle plugin from your build config on every build."
note = "(NOTE: edit `build.gradle`/`build.gradle.kts` instead — hand edits are overwritten immediately)"

# Django
[[read-write-guard.rules]]
filename = "db.sqlite3"
[read-write-guard.rules.access.write]
hint = "Run `python manage.py migrate`, or use the `sqlite3` CLI/ORM, instead of editing the file directly."
note = "(NOTE: it's a binary SQLite database — direct text edits will corrupt it)"

# Generated code (protobuf / gRPC) — basename globs, write-deny only since
# reading these isn't noise the way a lockfile is.
[[read-write-guard.rules]]
filename = "*_pb2.py"
[read-write-guard.rules.access.write]
hint = "Edit the `.proto` file and regenerate with `protoc`/`grpc_tools.protoc` instead."
note = "(NOTE: this file is fully regenerated on every protoc run)"

[[read-write-guard.rules]]
filename = "*_pb2_grpc.py"
[read-write-guard.rules.access.write]
hint = "Edit the `.proto` file and regenerate with `protoc`/`grpc_tools.protoc` instead."
note = "(NOTE: this file is fully regenerated on every protoc run)"

[[read-write-guard.rules]]
filename = "*.pb.go"
[read-write-guard.rules.access.write]
hint = "Edit the `.proto` file and regenerate with `protoc-gen-go` instead."
note = "(NOTE: this file is fully regenerated on every protoc run)"

[[read-write-guard.rules]]
filename = "*_grpc.pb.go"
[read-write-guard.rules.access.write]
hint = "Edit the `.proto` file and regenerate with `protoc-gen-go-grpc` instead."
note = "(NOTE: this file is fully regenerated on every protoc run)"

# Noise directories — full-path globs, deny both (same shape as a lockfile):
# regenerated/managed entirely by tooling, and not useful to read directly.
[[read-write-guard.rules]]
filename = "**/node_modules/**"
[read-write-guard.rules.access.no]
hint = "Run `npm install`/`yarn install`/`pnpm install` to manage dependencies — never hand-edit installed packages."
note = "(NOTE: this directory is entirely regenerated by the package manager and excluded from version control)"

[[read-write-guard.rules]]
filename = "**/.git/**"
[read-write-guard.rules.access.no]
hint = "Use `git` commands (`git add`, `git commit`, `git log`, etc.) instead of touching repository internals directly."
note = "(NOTE: hand-editing anything under `.git/` can corrupt the repository)"
