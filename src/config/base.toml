# Terraform state (generated, writes-only — reads aren't noise the way
# lockfiles are; agents may legitimately need to inspect current state)
[[read-write-guard.rules]]
filename = "terraform.tfstate"
[read-write-guard.rules.access.write]
hint = "Run `terraform apply`/`terraform plan`, or `terraform state` subcommands, instead of editing it directly."
note = "(NOTE: hand-editing state can desync it from real infrastructure and cause `terraform apply` to destroy or orphan resources)"

[[read-write-guard.rules]]
filename = "terraform.tfstate.backup"
[read-write-guard.rules.access.write]
hint = "This is an automatic backup written by Terraform itself — use `terraform state` subcommands to fix state issues."
note = "(NOTE: it should never be restored or edited by hand)"

# Go workspaces
[[read-write-guard.rules]]
filename = "go.work.sum"
[read-write-guard.rules.access.write]
hint = "Run `go build`/`go test` in the workspace (or `go work sync`) to update it."
note = "(NOTE: this is the workspace-level companion to `go.sum`)"

