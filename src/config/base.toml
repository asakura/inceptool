# Embedded base config: built-in defaults for every stage, in the same
# shape as a user `inceptool.toml`. Parsed by `RawConfig::parse_base_config`
# and merged with user layers like any other layer (see `RawConfig::merge`).
#
# Users may add or override entries via the same `[[read-write-guard.rules]]`
# table in their own `inceptool.toml`.

# Nix
[[read-write-guard.rules]]
filename = "flake.lock"
[read-write-guard.rules.access.no]
hint = "Run `nix flake update` to update it."
note = "(NOTE: this updates ALL flake inputs — use `nix flake update <name>` to update a specific one)"

