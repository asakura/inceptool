[read-write-guard.rules.access.no]
hint = "Private SSH keys should never be generated or modified by an agent."
note = "(NOTE: use `ssh-keygen` directly in a terminal if a new key is truly needed)"

# Verbose/low-signal logs and crash dumps — read-deny only.
[[read-write-guard.rules]]
filename = "npm-debug.log*"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "yarn-error.log*"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "lerna-debug.log*"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "*.dmp"
[read-write-guard.rules.access.read]

# Big-data / binary / ML formats — read-deny only (binary, unreadable as
# text; writing isn't guarded since these are usually produced by a real
# data/training pipeline, not hand-edited either way).
[[read-write-guard.rules]]
filename = "*.parquet"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "*.avro"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "*.orc"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "*.safetensors"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "*.onnx"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "*.pt"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "*.bin"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "*.sqlite"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "*.sqlite3"
[read-write-guard.rules.access.read]

[[read-write-guard.rules]]
filename = "*.db"
[read-write-guard.rules.access.read]
