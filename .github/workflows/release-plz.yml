name: Release-plz

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Publishes pending crates.io releases / GitHub releases for crates whose
  # version was already bumped (i.e. a release-plz PR was merged).
  release-plz-release:
    name: Release-plz release
    # No `pull_request` trigger exists for this workflow at all (push:main
    # only); this guard additionally no-ops the job if a fork happens to push
    # to its own `main` with this same workflow file.
    if: github.repository_owner == 'asakura'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/[email protected]
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Opens/updates the "release PR" with version bumps + changelog entries
  # computed from conventional commits since the last release.
  release-plz-pr:
    name: Release-plz PR
    if: github.repository_owner == 'asakura'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/[email protected]
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
