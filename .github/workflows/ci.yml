name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: cachix/cachix-action@v17
        with:
          name: inceptool
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: Swatinem/rust-cache@v2

      # Run all cargo checks outside the sandbox to share the rust-cache
      - name: cargo fmt
        run: nix develop -c cargo fmt --check

      - name: cargo clippy
        run: nix develop -c cargo clippy --workspace --all-targets -- -D warnings

      # Runs outside the sandbox (network + .git access) inside the pinned devShell.
      - name: cargo test --workspace
        run: nix develop -c cargo test --workspace

      - name: cargo deny check
        run: nix develop -c cargo deny check
