name: Coverage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# GitHub's recommended pattern for Pages deploys: queue rather than cancel, in
# a group separate from the `ci.yml` workflow's.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: cachix/cachix-action@v17
        with:
          name: inceptool
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: Swatinem/rust-cache@v2

      # Run the workspace test suite once under coverage instrumentation,
      # without generating a report yet, so the html and json reports below
      # can both be rendered from the same profile data.
      - name: cargo llvm-cov nextest --workspace
        run: nix develop -c cargo llvm-cov nextest --workspace --no-report

      - name: Generate HTML report
        run: nix develop -c cargo llvm-cov report --html

      - name: Generate coverage badge
        run: |
          set -euo pipefail
          nix develop -c cargo llvm-cov report --json --summary-only --output-path coverage-summary.json
          jq '.data[0].totals.lines.percent as $p | {
            schemaVersion: 1,
            label: "coverage",
            message: "\(($p * 10 | round) / 10)%",
            color: (if $p >= 80 then "brightgreen" elif $p >= 60 then "yellow" else "red" end)
          }' coverage-summary.json > target/llvm-cov/html/coverage.json

      - name: Generate cargo-deny badge
        if: always()
        run: |
          set -euo pipefail
          # Run cargo deny, ignoring exit code so we can still generate the badge on failure
          nix develop -c cargo deny --format json check 2> deny.json || true
          grep '^{' deny.json | jq -rs '
            .[] | select(.type == "summary") | .fields |
            (if .advisories.errors == 0 then 1 else 0 end) as $a_ok |
            (if .bans.errors == 0 then 1 else 0 end) as $b_ok |
            (if .licenses.errors == 0 then 1 else 0 end) as $l_ok |
            (if .sources.errors == 0 then 1 else 0 end) as $s_ok |
            ($a_ok + $b_ok + $l_ok + $s_ok) as $total_ok |
            (
              if $total_ok == 4 then "brightgreen"
              elif $total_ok == 3 then "yellowgreen"
              elif $total_ok == 2 then "yellow"
              elif $total_ok == 1 then "orange"
              else "red" end
            ) as $color |
            (
              if $total_ok == 4 then "advisories ok, bans ok, licenses ok, sources ok"
              else
                [
                  (if $a_ok == 1 then "advisories ok" else "advisories failed" end),
                  (if $b_ok == 1 then "bans ok" else "bans failed" end),
                  (if $l_ok == 1 then "licenses ok" else "licenses failed" end),
                  (if $s_ok == 1 then "sources ok" else "sources failed" end)
                ] | join(", ")
              end
            ) as $msg |
            {
              schemaVersion: 1,
              label: "cargo-deny",
              message: $msg,
              color: $color
            }
          ' > target/llvm-cov/html/cargo-deny.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: target/llvm-cov/html

      - id: deployment
        uses: actions/deploy-pages@v5
